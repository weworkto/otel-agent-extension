name: Build & Release

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: gradle build

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: extension-jar
          path: build/libs/opentelemetry-javaagent-extensions-*.jar

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/libs/opentelemetry-javaagent-extensions-*.jar
          generate_release_notes: true
